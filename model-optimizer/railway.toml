# Railway deployment config for the private CodePit managed-worker service.
# Configure the Railway service root as `agents/model-optimizer` so this file
# and Dockerfile are evaluated from the Python kit directory.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m codepit_optimizer.managed_worker"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
